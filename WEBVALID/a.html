<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form</title>
    <script defer src="script.js"></script>

    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: Arial, sans-serif;
            background: #f4f6f8;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

            width: 90%;
            max-width: 350px;
        }

        h2 {
            text-align: center;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Register</h2>

    <form id="myForm">

        <label>Name:</label>
        <input type="text" id="name">
        <div class="error" id="nameError"></div>

        <label>Email:</label>
        <input type="text" id="email">
        <div class="error" id="emailError"></div>

        <label>Password:</label>
        <input type="password" id="password">
        <div class="error" id="passwordError"></div>

        <label>Mobile Number:</label>
        <input type="text" id="mobile">
        <div class="error" id="mobileError"></div>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
